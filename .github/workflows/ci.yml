name: Trading Bot CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Runs every Monday at 14:00 UTC = 9:00 AM EST / 10:00 AM EDT (mirrors bot-weekly-tests)
    - cron: "0 14 * * 1"
  workflow_dispatch:
    inputs:
      run_slow_tests:
        description: "Include slow (full backtest) tests?"
        required: false
        default: "false"
        type: boolean

env:
  PYTHONPATH: ${{ github.workspace }}
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  # ── Job 1: Fast unit tests (no real data, no slow backtests) ──────────────
  unit-tests:
    name: Unit Tests (fast)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-timeout

      - name: Run fast unit tests (no real data, no slow marker)
        run: |
          pytest tests/ \
            -m "not slow and not real_data" \
            --timeout=30 \
            --cov=backtester --cov=strategies --cov=ibkr \
            --cov-report=xml \
            --cov-report=term-missing \
            -v
        continue-on-error: false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Job 2: Data integrity tests (requires cached real data) ───────────────
  data-integrity:
    name: Data Integrity Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-timeout

      - name: Restore cached market data
        id: cache-data
        uses: actions/cache@v4
        with:
          path: data/processed/
          key: market-data-${{ hashFiles('data/fetch_data.py') }}-${{ env.CACHE_DATE }}
          restore-keys: market-data-

      - name: Fetch market data (if cache miss)
        if: steps.cache-data.outputs.cache-hit != 'true'
        run: python3 data/fetch_data.py
        env:
          CACHE_DATE: ${{ vars.CACHE_DATE || '2026-01' }}

      - name: Run data quality tests
        run: |
          pytest tests/test_data_quality.py \
            --timeout=60 \
            -v
        continue-on-error: false

  # ── Job 3: Regime and signal tests (requires real data) ───────────────────
  signal-tests:
    name: Regime & Signal Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: data-integrity

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-timeout

      - name: Restore cached market data
        uses: actions/cache@v4
        with:
          path: data/processed/
          key: market-data-${{ hashFiles('data/fetch_data.py') }}-${{ env.CACHE_DATE }}
          restore-keys: market-data-
        env:
          CACHE_DATE: ${{ vars.CACHE_DATE || '2026-01' }}

      - name: Run regime + signal tests
        run: |
          pytest \
            tests/test_regime_classifier.py \
            tests/test_signal_pipeline.py \
            tests/test_edge_cases.py \
            tests/test_lookahead_bias.py \
            --timeout=120 \
            -v

  # ── Job 4: Extreme event tests (fast — synthetic data only) ───────────────
  extreme-event-tests:
    name: Extreme Event & Crash Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-timeout

      - name: Run extreme event tests
        run: |
          pytest tests/test_extreme_events.py \
            -m "not slow" \
            --timeout=60 \
            -v

  # ── Job 5: IBKR module tests (all mocked — no real connection) ────────────
  ibkr-unit-tests:
    name: IBKR Safety Module Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-timeout

      - name: Run IBKR safety tests
        run: |
          pytest tests/test_ibkr_safety.py \
            --timeout=30 \
            -v

  # ── Job 6: Slow tests — full backtest performance regression ──────────────
  performance-regression:
    name: Performance Regression (slow)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Only run on scheduled trigger or manual dispatch with run_slow_tests=true
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_slow_tests == 'true')
    needs: [data-integrity, signal-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-timeout

      - name: Restore cached market data
        uses: actions/cache@v4
        with:
          path: data/processed/
          key: market-data-${{ hashFiles('data/fetch_data.py') }}-${{ env.CACHE_DATE }}
          restore-keys: market-data-
        env:
          CACHE_DATE: ${{ vars.CACHE_DATE || '2026-01' }}

      - name: Run full performance regression suite
        run: |
          pytest \
            tests/test_performance.py \
            tests/test_execution_stress.py \
            tests/test_regime_noise.py \
            tests/test_extreme_events.py \
            -m "slow" \
            --timeout=600 \
            -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-regression-results
          path: |
            logs/
            *.csv

  # ── Job 7: Summary gate — all fast tests must pass for PRs ───────────────
  all-checks-pass:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - signal-tests
      - extreme-event-tests
      - ibkr-unit-tests
    if: always()
    steps:
      - name: Check all required jobs passed
        run: |
          if [[ "${{ needs.unit-tests.result }}"         != "success" ||
                "${{ needs.signal-tests.result }}"       != "success" ||
                "${{ needs.extreme-event-tests.result }}" != "success" ||
                "${{ needs.ibkr-unit-tests.result }}"    != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All checks passed ✓"
