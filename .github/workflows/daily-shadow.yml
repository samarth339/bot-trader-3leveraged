name: Daily Shadow Run

# Runs every weekday at 4:30 PM EST (21:30 UTC) — always after NYSE close.
# In summer (EDT = UTC-4) this fires at 5:30 PM local, still post-market.
# Manual trigger available for testing or catch-up runs.
on:
  schedule:
    - cron: "30 21 * * 1-5"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Force run even if today is a holiday?"
        required: false
        default: "false"
        type: boolean

env:
  PYTHONPATH: ${{ github.workspace }}
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  shadow-run:
    name: Shadow Mode — Daily Signal
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write   # required to commit signal logs back to main

    steps:
      - name: Checkout repo (with write access for log commit)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch full history so git log / blame works in scripts
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Fetch latest market data
        run: python3 data/fetch_data.py
        # yfinance pulls up to yesterday's close; no secrets needed

      - name: Run shadow mode (generate signal + update logs)
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          # Use --force on manual dispatch so test runs always generate a signal
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python3 shadow_mode.py --force
          else
            python3 shadow_mode.py
          fi

      - name: Write job summary (visible in Actions tab)
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, csv, os, sys
          from pathlib import Path

          summary_file = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")

          state_path   = Path("logs/shadow_state.json")
          history_path = Path("logs/signal_history.csv")

          state = json.loads(state_path.read_text()) if state_path.exists() else {}
          day   = state.get("day_number", "?")
          total = max(int(day) if str(day).isdigit() else 1, 1)

          pct_b = round(state.get("days_bull",      0) / total * 100, 1)
          pct_u = round(state.get("days_uncertain", 0) / total * 100, 1)
          pct_h = round(state.get("days_high_vol",  0) / total * 100, 1)

          EMOJI = {"bull": "🐂", "uncertain": "⚠️", "high_vol": "🔴"}

          rows = []
          if history_path.exists():
              with open(history_path) as f:
                  rows = list(csv.DictReader(f))

          latest = rows[-1] if rows else {}
          regime = latest.get("regime", "—")
          emoji  = EMOJI.get(regime, "❓")

          # ── Portfolio P&L from state ──────────────────────────────
          pnl = state.get("portfolio", {})
          def fmt_money(v): return f"${abs(v):>9,.2f}"
          def fmt_sign(v):  return "+" if v >= 0 else "-"

          if pnl:
              gain     = pnl.get("gain_loss", 0)
              td_val   = pnl.get("today_change_val", 0)
              pnl_rows = [
                  f"| 💵 Starting Capital | ${pnl.get('start_value', 5000):,.2f} |",
                  f"| 📊 Current Value    | ${pnl.get('current_value', 0):,.2f} |",
                  f"| {'📈' if gain>=0 else '📉'} Total Return     | {fmt_sign(gain)}{fmt_money(gain)}  ({fmt_sign(gain)}{abs(pnl.get('pct_return',0)):.1f}%) |",
                  f"| 📅 Today's Change   | {fmt_sign(td_val)}{fmt_money(td_val)}  ({fmt_sign(td_val)}{abs(pnl.get('today_change_pct',0)):.1f}%) |",
                  f"| 🔝 Best Day         | +{pnl.get('best_day_pct',0):.1f}% |",
                  f"| 🔻 Worst Day        | {pnl.get('worst_day_pct',0):.1f}% |",
              ]
          else:
              pnl_rows = ["| — | P&L data not yet available |"]

          lines = [
              f"## {emoji} Trading Bot — Shadow Day {day}/30",
              f"",
              f"### 💰 Portfolio Snapshot",
              f"| | |",
              f"|---|---|",
          ] + pnl_rows + [
              f"",
              f"> Shadow mode — no real money invested",
              f"",
              f"---",
              f"",
              f"### 📡 Today's Signal",
              f"| Field | Value |",
              f"|---|---|",
              f"| Date | {latest.get('as_of_date', '—')} |",
              f"| Regime | **{emoji} {regime.upper()}** |",
              f"| Action | `{latest.get('action', '—')}` |",
              f"| Allocation | {int(float(latest.get('weight_a',0.5))*100)}% A / {int(float(latest.get('weight_b',0.5))*100)}% B |",
              f"| QQQ (T-1) | ${float(latest.get('qqq_price',0)):.2f} |",
              f"| % vs SMA-130 | {latest.get('pct_vs_sma', '—')}% |",
              f"| VIX raw | {latest.get('vix_raw', '—')} |",
              f"| VIX smoothed (5d) | {latest.get('vix_signal', '—')} |",
              f"",
              f"### 📊 Regime Distribution ({day} days)",
              f"| Regime | Days | Share |",
              f"|---|---|---|",
              f"| 🐂 Bull | {state.get('days_bull',0)} | {pct_b}% |",
              f"| ⚠️ Uncertain | {state.get('days_uncertain',0)} | {pct_u}% |",
              f"| 🔴 High-Vol | {state.get('days_high_vol',0)} | {pct_h}% |",
              f"",
              f"Regime flips: **{state.get('regime_flips',0)}** &nbsp;|&nbsp; Alerts: **{state.get('total_alerts',0)}**",
              f"",
              f"### 🗓️ Last 7 Signals",
              f"| Date | Regime | Action | VIX | QQQ | Alloc |",
              f"|---|---|---|---|---|---|",
          ]

          for r in rows[-7:]:
              em = EMOJI.get(r.get("regime",""), "❓")
              wa = float(r.get("weight_a", 0.5))
              lines.append(
                  f"| {r.get('as_of_date','—')} "
                  f"| {em} {r.get('regime','—').upper()} "
                  f"| {r.get('action','—')} "
                  f"| {r.get('vix_raw','—')} "
                  f"| ${float(r.get('qqq_price',0)):.2f} "
                  f"| {int(wa*100)}/{int((1-wa)*100)} |"
              )

          lines += [""]

          with open(summary_file, "a") as f:
              f.write("\n".join(lines) + "\n")
          print("Job summary written.")
          PYEOF

      - name: Commit updated signal log and state back to repo
        run: |
          git config user.name  "bot-shadow[bot]"
          git config user.email "samarth339@gmail.com"

          # Stage only the log files we expect to change each run
          git add logs/signal_history.csv logs/shadow_state.json || true

          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No log changes to commit (possibly a market holiday or duplicate run)."
          else
            TODAY=$(date -u '+%Y-%m-%d')
            git commit -m "shadow: daily signal log update ${TODAY} [skip ci]"
            git push
            echo "Log update pushed to main."
          fi
