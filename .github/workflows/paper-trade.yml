name: Phase 4 — Paper Trade Execution (IBKR)

# Runs every weekday at ~3:45 PM EDT via a self-hosted runner on your Mac.
# The self-hosted runner has IB Gateway running on localhost:4002 (paper port).
# ibkr/executor.py connects to IB, runs all 10 safety guards, and submits a
# real MOC order on paper account DUP540674.
#
# Requires:
#   1. A GitHub Actions self-hosted runner installed and running on your Mac
#      (see README "Self-Hosted Runner Setup" section)
#   2. IB Gateway running on localhost:4002 before 3:45 PM ET
#
# Cron timing (UTC, EDT = UTC-4):
#   EDT (Mar–Nov): cron "37 19" → dispatches ~3:45 PM ET  ← current
#   EST (Nov–Mar): change to   "37 20"  when clocks fall back in November
#
# Manual dry-run (no order submitted):
#   Actions tab → Phase 4 — Paper Trade Execution → Run workflow → dry_run=true

on:
  schedule:
    - cron: "37 19 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — connect + compute plan but do NOT submit order"
        required: false
        default: "false"
        type: boolean

env:
  PYTHONPATH: ${{ github.workspace }}
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  paper-trade-ibkr:
    name: Submit MOC Paper Order via IB Gateway
    runs-on: self-hosted          # Must be the Mac with IB Gateway on port 4002
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout repo (pull latest signal)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Verify IB Gateway is reachable on port 4002
        run: |
          python3 - <<'PYEOF'
          import socket, sys
          try:
              s = socket.create_connection(("127.0.0.1", 4002), timeout=5)
              s.close()
              print("IB Gateway reachable on port 4002 ✓")
          except Exception as e:
              print(f"ERROR: IB Gateway NOT reachable on port 4002: {e}")
              print("Make sure IB Gateway is running and API connections are enabled.")
              sys.exit(1)
          PYEOF

      - name: Verify today's signal exists
        run: |
          python3 - <<'PYEOF'
          import pandas as pd
          from datetime import date, timedelta
          from pathlib import Path

          path = Path("logs/signal_history.csv")
          if not path.exists():
              print("ERROR: signal_history.csv not found")
              exit(1)

          df  = pd.read_csv(path, parse_dates=["as_of_date"])
          row = df.iloc[-1]
          sig_date = pd.Timestamp(row["as_of_date"]).date()
          today    = date.today()
          age      = (today - sig_date).days

          print(f"Signal: {sig_date}  regime={row['regime']}  "
                f"action={row['action']}  weight_a={row['weight_a']}  age={age}d")

          if age > 4:
              print(f"WARNING: Signal is {age} days old. "
                    "The daily-signal workflow may have failed.")
          PYEOF

      - name: Install / sync dependencies
        run: |
          pip install --quiet -r requirements.txt

      - name: Execute paper trade via IB Gateway
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "=== DRY RUN MODE — no order will be submitted ==="
            python3 -m ibkr.executor --paper --dry-run
          else
            python3 -m ibkr.executor --paper
          fi

      - name: Show post-execution status
        if: always()
        run: python3 -m ibkr.executor --status

      - name: Write job summary
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, os
          from pathlib import Path

          summary = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")

          # Read IBKR state (source of truth for real fills)
          state_path = Path("logs/ibkr_state.json")
          state = json.loads(state_path.read_text()) if state_path.exists() else {}

          # Read latest signal
          import csv
          sig_rows = []
          sig_path = Path("logs/signal_history.csv")
          if sig_path.exists():
              with open(sig_path) as f:
                  sig_rows = list(csv.DictReader(f))
          sig = sig_rows[-1] if sig_rows else {}

          # Read order log for today's fill
          order_rows = []
          order_path = Path("logs/ibkr_orders.csv")
          if order_path.exists():
              with open(order_path) as f:
                  order_rows = list(csv.DictReader(f))
          today_orders = [r for r in order_rows
                          if r.get("date","").startswith(str(__import__("datetime").date.today()))]
          latest_order = today_orders[-1] if today_orders else {}

          nlv       = state.get("last_nlv", 0)
          shares    = state.get("last_shares_tqqq", 0)
          fill      = state.get("last_fill_price", 0)
          target    = state.get("last_target_pct", 0)
          n_trades  = state.get("total_trades_ytd", 0)
          regime    = state.get("last_regime", sig.get("regime", "—"))
          order_id  = state.get("last_order_id", "—")
          peak      = state.get("peak_equity", nlv or 5877)
          dd        = (peak - nlv) / peak if peak > 0 and nlv > 0 else 0

          emoji = {"bull": "🐂", "uncertain": "⚠️", "high_vol": "🔴"}.get(regime, "❓")
          order_status = latest_order.get("status", "—")

          lines = [
              f"## {emoji} IBKR Paper Trade — {__import__('datetime').date.today()}",
              "",
              "### Execution",
              "| | |",
              "|---|---|",
              f"| Account | DUP540674 (paper) |",
              f"| Regime | **{emoji} {regime.upper()}** |",
              f"| Order status | `{order_status}` |",
              f"| Order ID | {order_id} |",
              f"| Fill price | ${fill:.2f} |" if fill else "| Fill price | — |",
              "",
              "### Portfolio (IBKR account)",
              "| | |",
              "|---|---|",
              f"| TQQQ shares | {shares} |",
              f"| Target alloc | {target:.1%} |",
              f"| NLV | ${nlv:,.2f} |" if nlv else "| NLV | — |",
              f"| Peak equity | ${peak:,.2f} |",
              f"| Drawdown | {dd:.1%} |",
              f"| Trades YTD | {n_trades} |",
              "",
              "### Today's Signal",
              "| | |",
              "|---|---|",
              f"| Signal date | {sig.get('as_of_date','—')} |",
              f"| Action | `{sig.get('action','—')}` |",
              f"| Allocation | {int(float(sig.get('weight_a',0.5))*100)}% A / {int(float(sig.get('weight_b',0.5))*100)}% B |",
              f"| QQQ (T-1) | ${float(sig.get('qqq_price',0)):.2f} |",
              f"| VIX (5d) | {sig.get('vix_signal','—')} |",
              f"| Gap guard | {'🚫 TRIGGERED' if str(sig.get('gap_guard','')).lower() in ('true','1') else '✅ clear'} |",
          ]
          with open(summary, "a") as f:
              f.write("\n".join(lines) + "\n")
          print("Job summary written.")
          PYEOF
