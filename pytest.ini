[pytest]
# ── Test discovery ─────────────────────────────────────────────────────────────
testpaths     = tests
python_files  = test_*.py
python_classes= Test*
python_functions = test_*

# ── Markers ────────────────────────────────────────────────────────────────────
markers =
    slow: marks tests that run a full backtest (deselect with -m "not slow")
    ibkr: marks tests that require IBKR module (always mocked — no real connection)
    real_data: marks tests that require data/processed/ CSV files

# ── Output ─────────────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    -q

# ── Warnings ───────────────────────────────────────────────────────────────────
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning:pandas
    ignore::UserWarning:yfinance
